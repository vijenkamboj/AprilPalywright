# .github/workflows/smoke.yml
# Runs on every PR push — fast critical-path tests only (~5 min)

name: 🚀 Smoke Tests

on:
  pull_request:
    branches: ['**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, staging]
        default: dev

env:
  TEST_ENV:        ${{ inputs.environment || 'dev' }}
  DEV_BASE_URL:    ${{ secrets.DEV_BASE_URL }}
  STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
  TEST_USERNAME:   ${{ secrets.TEST_USERNAME }}
  TEST_PASSWORD:   ${{ secrets.TEST_PASSWORD }}

jobs:
  smoke:
    name: Smoke — ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test --config=playwright.smoke.config.js

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: playwright-report/smoke/
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-junit-${{ github.run_id }}
          path: test-results/smoke-junit.xml

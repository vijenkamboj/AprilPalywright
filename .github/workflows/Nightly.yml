# .github/workflows/nightly.yml
# Runs every night at 2am UTC — full suite on staging + prod smoke

name: 🌙 Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'           # 2:00 AM UTC every day
  workflow_dispatch:               # also allow manual trigger

jobs:
  # ── Full regression on staging ──────────────────────────────────────────────
  nightly-staging:
    name: Nightly — Staging — Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    env:
      TEST_ENV:         staging
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      TEST_USERNAME:    ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD:    ${{ secrets.TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Run nightly tests on staging
        run: |
          npx playwright test \
            --config=playwright.nightly.config.js \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-blob-staging-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  # ── Smoke on production after nightly staging passes ────────────────────────
  nightly-prod-smoke:
    name: Nightly — Prod Smoke
    needs: nightly-staging
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TEST_ENV:      prod
      PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
      TEST_USERNAME: ${{ secrets.PROD_TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.PROD_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Run smoke on prod
        run: npx playwright test --config=playwright.smoke.config.js

      - name: Upload prod smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-prod-smoke-${{ github.run_id }}
          path: playwright-report/smoke/
          retention-days: 30

  # ── Merge all nightly reports ────────────────────────────────────────────────
  merge-nightly-reports:
    name: Merge Nightly Reports
    needs: [nightly-staging, nightly-prod-smoke]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: nightly-blob-staging-*
          merge-multiple: true

      - name: Merge into one HTML report
        run: npx playwright merge-reports --reporter html,junit ./all-blob-reports

      - name: Upload final nightly report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-full-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    needs: [nightly-staging, nightly-prod-smoke]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send Teams notification
        uses: skitionek/notify-microsoft-teams@v1.0.4
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          needs: ${{ toJson(needs) }}
          job: ${{ toJson(job) }}
          steps: ${{ toJson(steps) }}
